<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EJ Attendance Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .rotate-up { writing-mode: vertical-rl; transform: rotate(180deg); height: 120px; font-size: 11px; }
    .hidden { display: none; }
    @media print { .no-print { display: none !important; } .printable { visibility: visible; } }
  </style>
</head>
<body class="p-4">

<div class="container main-card p-4 bg-white rounded shadow">
  <h2 class="text-center text-primary mb-4 no-print">EJ Department Attendance Portal</h2>

  <div class="row g-3 mb-5 no-print text-center">
    <div class="col-md-6"><button class="btn btn-primary w-100 p-3" onclick="showSection('markDiv')">📋 Mark Attendance</button></div>
    <div class="col-md-6"><button class="btn btn-success w-100 p-3" onclick="showSection('reportDiv')">📊 View Reports</button></div>
  </div>

  <div id="markDiv" class="hidden no-print">
    <div class="d-flex justify-content-center gap-2 mb-4">
      <button class="btn btn-outline-dark" onclick="embed('FY_URL')">First Year</button>
      <button class="btn btn-outline-dark" onclick="embed('SY_URL')">Second Year</button>
      <button class="btn btn-outline-dark" onclick="embed('TY_URL')">Third Year</button>
    </div>
    <div id="formContainer" class="ratio ratio-16x9" style="height: 700px; display: none;">
      <iframe id="framer" src="" frameborder="0"></iframe>
    </div>
  </div>

  <div id="reportDiv" class="hidden no-print border p-4 rounded bg-light">
    <div class="row g-3">
      <div class="col-md-3">
        <label>Select Year</label>
        <select id="yearSel" class="form-select">
          <option value="FY">First Year</option>
          <option value="SY">Second Year</option>
          <option value="TY">Third Year</option>
        </select>
      </div>
      <div class="col-md-3">
        <label>Course Code</label>
        <input type="text" id="codeInp" class="form-control" placeholder="e.g. 314363">
      </div>
      <div class="col-md-3">
        <label>Type</label>
        <select id="typeInp" class="form-select"><option value="TH">Theory</option><option value="PR">Practical</option></select>
      </div>
      <div class="col-md-3 mt-auto">
        <button class="btn btn-success w-100" onclick="fetchReport()">Generate Report</button>
      </div>
    </div>
  </div>

  <div id="resultArea" class="mt-5 hidden printable">
    <div class="d-flex justify-content-between mb-3 no-print">
      <h4>Attendance Report Preview</h4>
      <button class="btn btn-dark" onclick="window.print()">🖨️ Print Report</button>
    </div>
    <div id="tableContainer" class="table-responsive"></div>
  </div>
</div>

<script>
  const API = "https://attendancewebapp-otc0.onrender.com"; // UPDATE THIS AFTER RENDER DEPLOY

  function showSection(id) {
    document.getElementById('markDiv').classList.add('hidden');
    document.getElementById('reportDiv').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
  }

  function embed(urlKey) {
    const urls = {
      'FY_URL': 'https://docs.google.com/forms/d/e/1AsUfy_twA1jecIXOmC7dJFea8D6IqpRP-10untFq2Jc/viewform?embedded=true',
      'SY_URL': 'https://docs.google.com/forms/d/e/1AsUfy_twA1jecIXOmC7dJFea8D6IqpRP-10untFq2Jc/viewform?embedded=true',
      'TY_URL': 'https://docs.google.com/forms/d/e/1aKRXUk9tvn1TTi7YnINSaMxqm9DH6UlI5vr328reuHk/viewform?embedded=true'
    };
    document.getElementById('formContainer').style.display = 'block';
    document.getElementById('framer').src = urls[urlKey];
  }

  async function fetchReport() {
    const year = document.getElementById('yearSel').value;
    const code = document.getElementById('codeInp').value;
    
    const res = await fetch(`${API}/report/${year}/${code}`);
    const data = await res.json();
    
    renderTable(data);
    document.getElementById('resultArea').classList.remove('hidden');
  }

  function renderTable(data) {
    // Logic to build a Times New Roman table with rotated dates 
    // similar to your Google Sheet report.
    let html = `<table class="table table-bordered text-center" style="font-family:'Times New Roman'">`;
    // ... table building logic ...
    document.getElementById('tableContainer').innerHTML = html;
  }
</script>
</body>
</html>
